# Cloudflare Pages + D1 configuration
# Docs: https://developers.cloudflare.com/pages/functions/bindings/#d1-databases
#
# Before deploying:
#   1. Create the database:
#        wrangler d1 create soundscape-comments
#   2. Copy the printed database_id into this file.
#   3. Apply the schema:
#        wrangler d1 execute soundscape-comments --file schema/d1_comments.sql
#   4. For local dev with wrangler pages dev:
#        wrangler d1 execute soundscape-comments --local --file schema/d1_comments.sql
#   5. Set admin password-reset secret:
#        wrangler pages secret put ADMIN_RESET_KEY --project-name soundscape-atlas

name                  = "soundscape-atlas"
compatibility_date    = "2024-01-01"
pages_build_output_dir = "website"

[[d1_databases]]
binding      = "DB"
database_name = "soundscape-comments"
database_id  = "ddd1f4b1-f4d2-42ff-8b1b-76ff945e2718"
